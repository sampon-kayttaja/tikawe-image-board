<html>

<head>
  <title>Edit Comment</title>
</head>

<body>
  <form action="/post/{{ comment[1] }}" method="get">
    <input type="submit" value="Back" />
  </form>

  <h1><b>EDIT COMMENT</b></h1>
    
  {% if session.username %}
  <p>
    You're signed in as: {{ session.username }}
  </p>
  <p>
    <form action="/update_comment/{{ comment[0] }}" method="POST" enctype="multipart/form-data">
      <p>
        Content: <br />
        <textarea name="content" rows="5" cols="40">{{ comment[3] }}</textarea>
      </p>
      <p>
        Image (optional): <br />
        <input type="file" name="image" />
      </p>
      <input type="hidden" name="csrf_token" value="{{ session.csrf_token }}" />
      <input type="submit" value="Update Comment" />
    </form>
  {% else %}
    <p>You must be signed in to edit a comment.</p>
  {% endif %}
  </p>


</body>
