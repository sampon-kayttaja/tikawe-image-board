<html>

<head>
  <title>Edit Post</title>
</head>

<body>
  <form action="/post/{{ post[0] }}" method="get">
    <input type="submit" value="Back" />
  </form>

  <h1><b>EDIT POST</b></h1>
    
  {% if session.username %}
  <p>
    You're signed in as: {{ session.username }}
  </p>
  <p>
    <form action="/update_post/{{ post[0] }}" method="POST" enctype="multipart/form-data">
      <p>
        Title: <br />
        <input type="text" name="title" value="{{ post[2] }}" />
      </p>
      <p>
        Content: <br />
        <textarea name="content" rows="5" cols="40">{{ post[4] }}</textarea>
      </p>
      <p>
        Image (optional): <br />
        <input type="file" name="image" />
      </p>
      <input type="hidden" name="csrf_token" value="{{ session.csrf_token }}" />
      <input type="submit" value="Update Post" />
    </form>
  {% else %}
    <p>You must be signed in to edit a post.</p>
  {% endif %}
  </p>


</body>
